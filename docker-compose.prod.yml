version: '3.9'
services:
  voice:
    build: ./twillio_comms_agent
    container_name: hospital_voice
    restart: unless-stopped
    env_file:
      - ./twillio_comms_agent/twillio_call/.env
    expose:
      - "5050"
    volumes:
      - ./twillio_comms_agent/twillio_call:/app:ro
      - ./twillio_comms_agent/data:/app/data:rw

  voice_nginx:
    image: nginx:stable-alpine
    container_name: hospital_voice_nginx
    restart: unless-stopped
    depends_on:
      - voice
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./twillio_comms_agent/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./twillio_comms_agent/nginx/ssl:/etc/nginx/ssl:ro

  orchestrator:
    build: ./orchestrator_service
    container_name: hospital_orchestrator
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    expose:
      - "8000"
    volumes:
      - ./Apointment_agent:/app/Apointment_agent:rw
      - ./.faiss_index:/app/.faiss_index:ro

  orchestrator_nginx:
    image: nginx:stable-alpine
    container_name: hospital_orchestrator_nginx
    restart: unless-stopped
    depends_on:
      - orchestrator
    ports:
      - "8080:443"
    volumes:
      - ./orchestrator_service/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./orchestrator_service/nginx/ssl:/etc/nginx/ssl:ro
